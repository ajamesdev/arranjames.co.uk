name: Daily rebuild

on:
    schedule:
        - cron: '0 6 * * *'
    workflow_dispatch:

permissions:
    actions: write

jobs:
    rebuild:
        runs-on: ubuntu-latest
        steps:
            - name: Trigger Cloudflare build
              run: curl -fsSL -X POST "${{ secrets.CF_DEPLOY_HOOK }}"
            - name: Keep schedule enabled
              run: |
                  curl -fsSL -X PUT \
                      -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                      "https://api.github.com/repos/${{ github.repository }}/actions/workflows/daily-rebuild.yml/enable"
