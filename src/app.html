<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#000000" />
		<meta name="google" content="notranslate, noimageindex" />

		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="%sveltekit.assets%/apple-touch-icon.png"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="%sveltekit.assets%/favicon-32x32.png"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="16x16"
			href="%sveltekit.assets%/favicon-16x16.png"
		/>

		<script>
			(function () {
				try {
					if (
						!location.pathname.endsWith('/simple') &&
						localStorage.getItem('theme') !== 'light'
					) {
						document.documentElement.classList.add('dark');
					}
				} catch (e) {
					document.documentElement.classList.add('dark');
				}
			})();
		</script>

		<script async src="https://www.googletagmanager.com/gtag/js?id=G-6CP53TYL00"></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag() {
				dataLayer.push(arguments);
			}
			window.gtag = gtag;
			gtag('js', new Date());
			gtag('config', 'G-6CP53TYL00');
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
